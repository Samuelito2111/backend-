<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naša Trieda | AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #334155; }
        .card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        #chat-window { position: fixed; bottom: 20px; right: 20px; width: 320px; height: 400px; background: var(--card-bg); border-radius: 15px; display: none; flex-direction: column; border: 1px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .chat-header { background: var(--primary); padding: 10px; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .user-msg { background: var(--primary); align-self: flex-end; }
        .ai-msg { background: #334155; align-self: flex-start; }
        .chat-input { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>NAŠA TRIEDA</h1>
    <div class="grid" id="grid"></div>

    <div id="chat-window">
        <div class="chat-header"><span id="chat-title">Chat</span><span onclick="closeChat()" style="cursor:pointer">&times;</span></div>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Napíš niečo...">
            <button onclick="sendMessage()">OK</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://backend-3qze.onrender.com';
        let currentNick = "";

        async function load() {
            const res = await fetch(`${API_URL}/api`);
            const data = await res.json();
            const grid = document.getElementById('grid');
            data.students.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.image}">
                        <h3>${s.name}</h3>
                        <p style="color:var(--primary)">@${s.nickname}</p>
                        <button onclick="openChat('${s.name}', '${s.nickname}')">Chat s AI</button>
                    </div>`;
            });
        }

        function openChat(name, nick) {
            currentNick = nick;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = "";
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        async function sendMessage() {
            const inp = document.getElementById('userInput');
            const txt = inp.value.trim();
            if(!txt) return;

            const msgDiv = document.getElementById('chat-messages');
            msgDiv.innerHTML += `<div class="msg user-msg">${txt}</div>`;
            inp.value = "";

            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: txt, nickname: currentNick })
                });
                const data = await res.json();
                
                // Oprava: Grok vracia choices[0].message.content
                const reply = data.choices ? data.choices[0].message.content : (data.error || "Skús to znova.");
                msgDiv.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } catch (e) {
                msgDiv.innerHTML += `<div class="msg ai-msg" style="color:red">Chyba pripojenia.</div>`;
            }
        }
        load();
    </script>
</body>
</html>
