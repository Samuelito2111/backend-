<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naša Trieda | AI Edition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f19; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { margin-bottom: 30px; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: #161b2b; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #2d334a; }
        .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #5865f2; margin-bottom: 10px; }
        .nickname { color: #5865f2; font-weight: bold; display: block; margin-bottom: 10px; }
        button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4752c4; }

        /* Pôvodné chatovacie okno */
        #chat-window { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: #1e2336; border-radius: 15px; display: none; flex-direction: column; border: 1px solid #5865f2; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-header { background: #5865f2; padding: 15px; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .user-msg { background: #5865f2; align-self: flex-end; }
        .ai-msg { background: #2d334a; align-self: flex-start; }
        .chat-input { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2d334a; }
        input { flex: 1; background: #0b0f19; border: 1px solid #2d334a; color: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>NAŠA TRIEDA</h1>
    <div class="grid" id="student-grid"></div>

    <div id="chat-window">
        <div class="chat-header"><span id="chat-title">Chat</span><i class="fas fa-times" onclick="closeChat()" style="cursor:pointer"></i></div>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Napíš niečo...">
            <button onclick="sendMessage()">Poslať</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://backend-3qze.onrender.com';
        let currentNick = "";

        async function load() {
            try {
                const res = await fetch(`${API_URL}/api`);
                const data = await res.json();
                const grid = document.getElementById('student-grid');
                data.students.forEach(s => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${s.image}">
                            <h3>${s.name} ${s.surname || ''}</h3>
                            <span class="nickname">@${s.nickname}</span>
                            <button onclick="openChat('${s.name}', '${s.nickname}')">Chat s AI</button>
                        </div>`;
                });
            } catch (e) { console.error("Chyba načítania", e); }
        }

        function openChat(name, nick) {
            currentNick = nick;
            document.getElementById('chat-title').innerText = "Chat s " + name;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-messages').innerHTML = "";
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        async function sendMessage() {
            const inp = document.getElementById('userInput');
            const txt = inp.value.trim();
            if(!txt) return;

            const msgDiv = document.getElementById('chat-messages');
            msgDiv.innerHTML += `<div class="msg user-msg">${txt}</div>`;
            inp.value = "";

            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: txt, nickname: currentNick })
                });
                const data = await res.json();
                
                let reply = "";
                if (data.choices && data.choices[0].message) {
                    reply = data.choices[0].message.content;
                } else {
                    reply = "Chyba: " + (data.error || "AI neodpovedá.");
                }
                
                msgDiv.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } catch (e) {
                msgDiv.innerHTML += `<div class="msg ai-msg">Server je offline.</div>`;
            }
        }
        load();
    </script>
</body>
</html>
