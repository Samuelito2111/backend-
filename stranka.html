<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Triedy | AI Edition</title>
    <style>
        :root {
            --accent: #6366f1; 
            --bg: #0f172a;    
            --card-bg: #1e293b; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --search-bg: #334155;
            --success: #10b981;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0; 
            padding: 40px 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }

        h1 { 
            font-size: 3rem; 
            font-weight: 900; 
            margin: 0 0 20px 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 50px;
        }

        #search {
            width: 100%;
            padding: 15px 25px;
            background: var(--search-bg);
            border: 2px solid transparent;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #search:focus {
            border-color: var(--accent);
            background: #3d4b5f;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
        }

        @media (max-width: 1200px) { .student-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .student-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 550px) { .student-grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
        }

        .photo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            border-radius: 25px;
            overflow: hidden;
            background: #0f172a;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .student-photo { width: 100%; height: 100%; object-fit: cover; }
        .full-name { font-size: 1.2rem; font-weight: 700; margin: 0; color: #fff; }
        .nickname { color: var(--accent); font-style: italic; font-size: 0.85rem; margin: 5px 0 15px 0; display: block; }

        /* TLAČIDLO PRE CHAT */
        .ai-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            transition: opacity 0.2s;
        }
        .ai-btn:hover { opacity: 0.8; }

        /* ČETOVACIE OKNO */
        #chat-container {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border: 2px solid var(--accent);
            border-radius: 20px;
            width: 350px;
            max-width: 90vw;
            height: 450px;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            background: var(--search-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #chat-logs {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f172a;
        }

        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .msg.user { background: var(--accent); align-self: flex-end; color: white; }
        .msg.ai { background: var(--search-bg); align-self: flex-start; color: white; }

        .chat-input-area { padding: 15px; display: flex; gap: 10px; background: #1e293b; }
        #chat-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        .send-btn { background: var(--success); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .id-badge { background: rgba(255,255,255,0.05); color: var(--text-dim); padding: 4px 0; border-radius: 8px; font-size: 0.75rem; font-family: monospace; }
        #status { text-align: center; color: #fb7185; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Naša Trieda</h1>
        <div class="search-container">
            <input type="text" id="search" placeholder="Hľadať študenta..." onkeyup="filterData()">
        </div>
    </header>

    <div id="status"></div>
    <div id="student-container" class="student-grid"></div>
</div>

<div id="chat-container">
    <div class="chat-header">
        <span id="chat-with-name" style="font-weight: bold;">AI Chat</span>
        <button onclick="closeChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">&times;</button>
    </div>
    <div id="chat-logs"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Napíš správu..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Odoslať</button>
    </div>
</div>

<script>
    let allStudents = []; 
    let activeNickname = ""; // Pre backend osobnosť

    window.onload = fetchData;

    async function fetchData() {
        const statusDiv = document.getElementById('status');
        try {
            const response = await fetch('https://backend-3qze.onrender.com/api');
            if (!response.ok) throw new Error();
            const data = await response.json();
            allStudents = data.students; 
            renderStudents(allStudents); 
        } catch (err) {
            statusDiv.innerHTML = "⚠️ Backend neodpovedá. Skontroluj Render.";
        }
    }

    function renderStudents(students) {
        const container = document.getElementById('student-container');
        if (students.length === 0) {
            container.innerHTML = `<div class="no-results">Nič sa nenašlo.</div>`;
            return;
        }

        container.innerHTML = students.map(s => `
            <div class="card">
                <div class="photo-box">
                    <img src="${s.image}" class="student-photo" alt="${s.name}" onerror="this.src='https://ui-avatars.com/api/?name=${s.name}+${s.surname}&background=6366f1&color=fff'">
                </div>
                <h3 class="full-name">${s.name} ${s.surname}</h3>
                <span class="nickname">${s.nickname ? '@' + s.nickname : ''}</span>
                
                <button class="ai-btn" onclick="openChat('${s.nickname}', '${s.name}')">🤖 Chat s AI</button>
                
                <div class="id-badge">ID: ${s.id.toString().padStart(2, '0')}</div>
            </div>
        `).join('');
    }

    function filterData() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = allStudents.filter(s => {
            return `${s.name} ${s.surname}`.toLowerCase().includes(query) || 
                   (s.nickname || "").toLowerCase().includes(query);
        });
        renderStudents(filtered);
    }

    // ČET LOGIKA
    function openChat(nickname, name) {
        activeNickname = nickname;
        document.getElementById('chat-container').style.display = 'flex';
        document.getElementById('chat-with-name').innerText = "Chat s: " + name;
        document.getElementById('chat-logs').innerHTML = `<div class="msg ai">Ahoj! Ja som tvoj asistent s osobnosťou ${name}. Ako ti môžem pomôcť?</div>`;
    }

    function closeChat() {
        document.getElementById('chat-container').style.display = 'none';
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const logs = document.getElementById('chat-logs');
        const text = input.value.trim();
        
        if (!text) return;

        // Pridaj bublinu používateľa
        logs.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        logs.scrollTop = logs.scrollHeight;

        try {
            const response = await fetch('https://backend-3qze.onrender.com/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: text, 
                    nickname: activeNickname 
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;

            // Pridaj bublinu AI
            logs.innerHTML += `<div class="msg ai">${aiReply}</div>`;
            logs.scrollTop = logs.scrollHeight;
        } catch (error) {
            logs.innerHTML += `<div class="msg ai" style="color: #fb7185;">Chyba: Nedá sa spojiť s AI.</div>`;
        }
    }
</script>

</body>
</html>
